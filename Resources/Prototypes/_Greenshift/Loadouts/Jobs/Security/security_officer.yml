# Senior Time
- type: loadoutEffectGroup
  id: GSSeniorOfficer
  effects:
  - !type:JobRequirementLoadoutEffect
    requirement:
      !type:RoleTimeRequirement
      role: GSJobWarden
      time: 6h
  - !type:JobRequirementLoadoutEffect
    requirement:
      !type:DepartmentTimeRequirement
      department: GSSecurity
      time: 60h

