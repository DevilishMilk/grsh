# Gloves
- type: loadout
  id: GSJanitorRubberGloves
  equipment:
    gloves: ClothingHandsGlovesJanitor

- type: loadout
  id: GSOrangeGloves
  equipment:
    gloves: ClothingHandsGlovesColorOrange

- type: loadout
  id: GSPurpleGloves
  equipment:
    gloves: ClothingHandsGlovesColorPurple

# Outer clothing
- type: loadout
  id: GSJanitorWintercoat
  equipment:
    outerClothing: ClothingOuterWinterJani
