# Species
- type: loadoutEffectGroup
  id: GSNitrogenBreather
  effects:
  - !type:SpeciesLoadoutEffect
    species:
    - SlimePerson
    - Vox

- type: loadoutEffectGroup
  id: GSOxygenBreather
  effects:
  - !type:SpeciesLoadoutEffect
    species:
    - Arachnid
    - Diona
    - Dwarf
    - Human
    - Moth
    - Reptilian
    - Vulpkanin

- type: loadoutEffectGroup
  id: GSEffectSpeciesVox
  effects:
