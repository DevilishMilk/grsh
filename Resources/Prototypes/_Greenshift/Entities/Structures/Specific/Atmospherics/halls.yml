- type: entity
  abstract: true
  parent: AirSensorBase
  id: GSAirSensorHallBase
  suffix: GS, Hall Atmosphere
  components:
  - type: AtmosMonitor
    gasThresholdPrototypes:
      Oxygen: stationOxygen
      Nitrogen: stationNitrogen
      CarbonDioxide: stationCO2
      Plasma: stationPlasma
      Tritium: stationTritium
      WaterVapor: GShallWaterVapor
      Ammonia: stationAmmonia
      NitrousOxide: stationNO
      Frezon: danger

- type: entity
  parent: [GSAirSensorHallBase, AirSensor]
  id: GSAirSensorHall

- type: entity
  parent: [GSAirSensorHallBase, GasVentPump]
  id: GSGasVentPumpHall

- type: entity
  parent: [GSAirSensorHallBase, GasVentScrubber]
  id: GSGasVentScrubberHall
  components:
  - type: GasVentScrubber
    wideNet: true # Air alarm with auto mode overrides filters with hardcoded defaults so default to widenet
    filterGases:
    - CarbonDioxide
    - Plasma
    - Tritium
    - Ammonia
    - NitrousOxide
    - Frezon

# use this to prevent overriding filters with hardcoded defaults
- type: entity
  parent: AirAlarm
  id: GSAirAlarmHall
  suffix: Hall Atmosphere, auto mode disabled
  components:
  - type: AirAlarm
    autoMode: false
