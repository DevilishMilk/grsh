- type: entity
  id: GSComputerCargoOrders
  parent: BaseComputerAiAccess
  name: cargo request computer
  description: Used to order supplies and approve requests.
  components:
  - type: Sprite
    layers:
    - map: ["computerLayerBody"]
      state: computer
    - map: ["computerLayerKeyboard"]
      state: generic_keyboard
    - map: ["computerLayerScreen"]
      state: request
    - map: ["computerLayerKeys"]
      state: generic_keys
    - map: [ "enum.WiresVisualLayers.MaintenancePanel" ]
      state: generic_panel_open
  - type: CargoOrderConsole
    removeLimitAccess: [ "Quartermaster" ]
    allowedGroups:
    - GSMarket
  - type: ActiveRadio
    channels:
    - Supply
  - type: ActivatableUI
    key: enum.CargoConsoleUiKey.Orders
  - type: UserInterface
    interfaces:
      enum.CargoConsoleUiKey.Orders:
        type: CargoOrderConsoleBoundUserInterface
      enum.WiresUiKey.Key:
        type: WiresBoundUserInterface
  - type: Computer
    board: GSCargoRequestComputerCircuitboard
  - type: PointLight
    radius: 1.5
    energy: 4.0
    color: "#b89f25"
  - type: AccessReader
    access: [["Cargo"]]
  - type: DeviceNetwork
    deviceNetId: Wireless
    receiveFrequencyId: BasicDevice
  - type: WirelessNetworkConnection
    range: 200
  - type: DeviceLinkSource
    range: 200
    ports:
    - OrderSender
  - type: GuideHelp
    guides:
    - Cargo
