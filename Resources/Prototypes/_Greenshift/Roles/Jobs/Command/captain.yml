- type: job
  id: GSCaptain
  name: job-name-captain
  description: job-description-captain
  playTimeTracker: GSJobCaptain
  requirements:
    - !type:DepartmentTimeRequirement
      department: GSEngineering
      time: 4h
    - !type:DepartmentTimeRequirement
      department: GSMedical
      time: 4h
    - !type:DepartmentTimeRequirement
      department: GSSecurity
      time: 4h
    - !type:DepartmentTimeRequirement
      department: GSCommand
      time: 4h
  weight: 20
  startingGear: GSCaptainGear
  icon: "JobIconCaptain"
  joinNotifyCrew: true
  supervisors: job-supervisors-centcom
  canBeAntag: false
  accessGroups:
  - AllAccess
  special:
  - !type:AddImplantSpecial
    implants: [ MindShieldImplant ]
  - !type:AddComponentSpecial
    components:
      - type: CommandStaff

- type: startingGear
  id: GSCaptainGear
  equipment:
    shoes: ClothingShoesBootsLaceup
    eyes: ClothingEyesGlassesCommand
    gloves: ClothingHandsGlovesCaptain
    id: CaptainPDA
    ears: ClothingHeadsetAltCommand
  storage:
    back:
    - Flash
    # - StationCharter

- type: chameleonOutfit
  id: GSCaptainChameleonOutfit
  job: GSCaptain
  hasMindShield: true
  equipment:
    head: ClothingHeadHatCapcap
    eyes: ClothingEyesGlassesCommand
    mask: ClothingMaskGasCaptain
    neck: ClothingNeckCloakCap
